<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#240b36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b06ab3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4568dc;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bgGradient)" />

  <!-- Cyberpunk grid lines -->
  <g stroke="#3e1c52" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="100" y1="0" x2="100" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="500" y1="0" x2="500" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="700" y1="0" x2="700" y2="200" />
  </g>

  <!-- Main text -->
  <text x="50" y="115" font-family="'Courier New', Courier, monospace" font-size="48" font-weight="bold" fill="url(#textGradient)" filter="url(#neonGlow)">
    babadeluxe-xo-config
  </text>

  <!-- Japanese zen tag -->
  <rect x="680" y="70" width="80" height="60" fill="none" stroke="#b06ab3" stroke-width="2" />
  <text x="700" y="115" font-family="sans-serif" font-size="40" fill="#b06ab3" filter="url(#neonGlow)">
    禅
  </text>

  <!-- Decorative elements -->
  <line x1="50" y1="135" x2="630" y2="135" stroke="#4568dc" stroke-width="2" />
  <rect x="50" y="65" width="20" height="5" fill="#4568dc" />
</svg>
